# git-cliff configuration for pi-skillshare
# https://git-cliff.org/docs/configuration

[changelog]
header = "# Changelog\n\nAll notable changes to **pi-skillshare** are documented here.\n"
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
{% if commit.scope -%}
  - **{{ commit.scope }}**: {{ commit.message | upper_first }}
{% else -%}
  - {{ commit.message | upper_first }}
{% endif %}
{% endfor %}
{% endfor %}
"""
trim = true
postprocessors = []  # no postprocessing

[git]
conventional_commits = true
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^refactor", group = "Changed" },
  { message = "^perf", group = "Changed" },
  { message = "^revert", group = "Changed" },
  { message = "^docs", group = "Documentation" },
  { message = "^style", group = "Changed" },
  { message = "^chore", group = "Miscellaneous" },
  { message = "^ci", group = "Miscellaneous" },
  { message = "^test", group = "Miscellaneous" },
  { message = "^build", group = "Miscellaneous" },
  { message = ".*", group = "Other" },
]
filter_commits = true
topo_order = false
sort_commits = "newest"
